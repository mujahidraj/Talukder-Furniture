<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <title>Talukder Furniture</title>
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, #ffffff 0%, #fcfbf9 100%);
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
      }
      #app-splash.hide {
        opacity: 0;
        visibility: hidden;
      }
      #app-splash img {
        width: 440px;
        height: 440px;
        object-fit: contain;
        animation: float 6s ease-in-out infinite;
        filter: drop-shadow(0 10px 20px rgba(0,0,0,0.03));
      }
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }
      .splash-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: -20px; /* Pull up closer to the image */
      }
      .splash-text {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-size: 16px;
        color: #1D4ED8;
        letter-spacing: 0.15em;
        margin-bottom: 16px;
        opacity: 0;
        animation: fadeIn 1s ease-out 0.5s forwards;
      }
      @keyframes fadeIn {
        to { opacity: 1; }
      }
      .splash-bar-track {
        width: 240px;
        height: 4px;
        background: #e0e7ff;
        border-radius: 4px;
        overflow: hidden;
        box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
      }
      .splash-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #1D4ED8, #60A5FA, #1D4ED8);
        background-size: 200% 100%;
        border-radius: 4px;
        animation: splashFill 3s cubic-bezier(0.65, 0, 0.35, 1) forwards, shimmer 2s linear infinite;
        box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
      }
      @keyframes splashFill {
        0%   { width: 0%; }
        20%  { width: 30%; }
        50%  { width: 60%; }
        80%  { width: 85%; }
        100% { width: 100%; }
      }
      @keyframes shimmer {
        0% { background-position: 100% 0; }
        100% { background-position: -100% 0; }
      }
      .splash-pct {
        margin-top: 12px;
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        font-weight: 500;
        color: #3B82F6;
        letter-spacing: 0.15em;
        opacity: 0;
        animation: fadeIn 1s ease-out 0.5s forwards;
      }
    </style>
  </head>
  <body>
    <!-- Initial splash screen — visible before React loads -->
    <div id="app-splash">
      <img src="/LOGO.gif" alt="Talukder Furniture" />
      <div class="splash-content">
        <span class="splash-text">Qualityful Life</span>
        <div class="splash-bar-track">
          <div class="splash-bar-fill"></div>
        </div>
        <span class="splash-pct" id="splash-pct">0%</span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function() {
        var duration = 3000;
        var start = Date.now();
        var el = document.getElementById('splash-pct');
        function tick() {
          var elapsed = Date.now() - start;
          var pct = Math.min(100, Math.round((elapsed / duration) * 100));
          if (el) el.textContent = pct + '%';
          if (pct < 100) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      })();
    </script>
  </body>
</html>
